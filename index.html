<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>结结恩的本科四年:D</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bebas+Neue&family=Ceviche+One&family=Cormorant+Garamond:wght@600;700&family=Dancing+Script:wght@400;600&family=Kaushan+Script&family=Lavishly+Yours&family=Noto+Serif+SC:wght@600;900&family=Orbitron:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <section class="home-view view is-active" id="homeView" aria-label="首页记忆球">
        <div class="home-heading" id="homeTitle">
          <h1>JJN's UG life @ CUHKSZ</h1>
          <p>2022-2026</p>
        </div>

        <div class="sphere-stage" id="sphereStage" aria-label="可点击的照片球"></div>

        <button class="enter-button" id="enterButton" type="button">
          <span>enter</span>
        </button>
      </section>

      <main class="page-view view" id="pageView" aria-live="polite"></main>
    </div>

    <div class="music-dock" id="musicDock" aria-label="背景音乐控制">
      <button class="music-toggle-button" id="musicToggleButton" type="button" disabled aria-label="播放或暂停背景音乐">♪</button>
      <button class="music-next-button" id="musicNextButton" type="button" disabled aria-label="切换到下一首">▶▌</button>
      <span class="music-status" id="musicStatus"><span class="music-status-text" id="musicStatusText">BGM loading</span></span>
      <audio id="bgmPlayer" autoplay preload="auto"></audio>
    </div>

    <div class="detail-modal" id="detailModal" aria-hidden="true">
      <div class="detail-backdrop" data-close-detail></div>
      <article class="detail-card" role="dialog" aria-modal="true" aria-label="照片详情"></article>
    </div>

    <div class="image-viewer" id="imageViewer" aria-hidden="true">
      <div class="image-viewer-backdrop" data-close-viewer></div>
      <button class="image-viewer-close" type="button" data-close-viewer aria-label="关闭大图">×</button>
      <img id="viewerImage" alt="" draggable="false" />
    </div>

    <div class="add-modal" id="addModal" aria-hidden="true">
      <div class="add-backdrop" data-close-add></div>
      <form class="add-panel" id="addForm">
        <div class="form-heading">
          <p class="panel-kicker" id="photoFormKicker">新增照片模块</p>
          <h2 id="photoFormTitle">把一段新记忆放进来</h2>
        </div>

        <label class="field field-file">
          <span>照片</span>
          <input id="photoFile" name="photoFile" type="file" accept="image/*" />
        </label>

        <label class="field">
          <span>标题</span>
          <input id="photoTitle" name="photoTitle" type="text" placeholder="例如：操场边的晚风" required />
        </label>

        <div class="form-row">
          <label class="field">
            <span>拍摄日期</span>
            <input id="photoDate" name="photoDate" type="date" />
          </label>
          <label class="field">
            <span>地点</span>
            <input id="photoPlace" name="photoPlace" type="text" placeholder="例如：图书馆门口" />
          </label>
        </div>

        <div class="form-row">
          <label class="field">
            <span>年级</span>
            <select id="photoYear" name="photoYear">
              <option value="freshman">大一</option>
              <option value="sophomore">大二</option>
              <option value="junior">大三</option>
              <option value="senior">大四</option>
            </select>
          </label>
          <label class="field">
            <span>月份</span>
            <select id="photoMonth" name="photoMonth"></select>
          </label>
        </div>

        <label class="field">
          <span>我的感想</span>
          <textarea id="photoFeeling" name="photoFeeling" rows="4" placeholder="写一点当时的心情"></textarea>
        </label>

        <section class="field tag-editor" aria-label="Tags">
          <span>Tags</span>
          <div class="selected-tag-list" id="selectedTagList"></div>
          <div class="tag-pick-list" id="tagPickList"></div>
          <div class="tag-create-row">
            <input id="newTagInput" type="text" placeholder="搜索或新增 tag" />
            <button class="small-button" type="button" id="addTagButton">添加</button>
          </div>
          <div class="tag-manage-list" id="tagManageList"></div>
        </section>

        <div class="form-actions">
          <button class="plain-button" type="button" data-close-add>取消</button>
          <button class="solid-button" type="submit" id="photoSubmitButton">保存记忆</button>
        </div>
      </form>
    </div>

    <div class="confirm-modal" id="deleteModal" aria-hidden="true">
      <div class="confirm-backdrop" data-close-delete></div>
      <section class="confirm-panel" role="dialog" aria-modal="true" aria-label="确认删除照片">
        <p class="panel-kicker">移到回收箱</p>
        <h2>确定删除这张照片吗？</h2>
        <p class="confirm-copy" id="deleteMessage">这张照片会先放进回收箱，可以稍后恢复。</p>
        <div class="form-actions">
          <button class="plain-button" type="button" data-close-delete>取消</button>
          <button class="solid-button danger-button" type="button" id="confirmDeleteButton">移到回收箱</button>
        </div>
      </section>
    </div>

    <div class="admin-modal" id="adminModal" aria-hidden="true">
      <div class="admin-backdrop" data-close-admin></div>
      <form class="admin-panel" id="adminForm" role="dialog" aria-modal="true" aria-label="管理员登录">
        <p class="panel-kicker">管理员权限</p>
        <h2>登录后才能修改照片</h2>
        <label class="field">
          <span>账号</span>
          <input id="adminUsername" name="adminUsername" type="text" autocomplete="username" required />
        </label>
        <label class="field">
          <span>密码</span>
          <input id="adminPassword" name="adminPassword" type="password" autocomplete="current-password" required />
        </label>
        <p class="admin-error" id="adminError" role="alert"></p>
        <div class="form-actions">
          <button class="plain-button" type="button" data-close-admin>取消</button>
          <button class="solid-button" type="submit">登录</button>
        </div>
      </form>
    </div>

    <div class="admin-welcome" id="adminWelcome" aria-hidden="true">
      <section class="admin-welcome-card" role="status" aria-live="polite">
        <p class="panel-kicker">Welcome back</p>
        <h2 id="adminWelcomeTitle">管理员已登录</h2>
        <p id="adminWelcomeCopy">本次权限将在 30 分钟后过期。</p>
      </section>
    </div>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="cloud-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
